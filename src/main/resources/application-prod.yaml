spring:
  datasource:
    masterdb:
      jdbc-url: jdbc:postgresql://${POSTGRES_MASTER_DB}/nsadb
      username: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      driver-class-name: org.postgresql.Driver
    slave-1-db:
      jdbc-url: jdbc:postgresql://${POSTGRES_SLAVE_DB}/nsadb
      username: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      driver-class-name: org.postgresql.Driver
  mail:
    host: ${SMTP_HOST}
    port: 587
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    address: ${SMTP_ADDRESS}

jwt:
  expiration: 24
  auth-header: App-Auth
  secret: ${JWT_SECRET}